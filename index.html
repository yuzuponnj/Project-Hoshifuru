<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>星降る短冊 ― 願いの庭 ―</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="opening"><p class="opening-text">願いを夜空へ。</p></div>
<div class="background">
<div class="stars"></div>
<div class="shooting-star"></div>
<img src="assets/bamboo-left.svg" class="bamboo left">
<img src="assets/bamboo-right.svg" class="bamboo right">
</div>
<main>
<h1>🌠 星降る短冊</h1>
<p class="subtitle">― 願いの庭 ―</p>
<section class="tanzaku">
<textarea placeholder="あなたの願いを書いてください..." maxlength="150"></textarea>
<input type="text" placeholder="ニックネーム（任意）">
<h3>短冊の色</h3>
<div class="colors">
<button class="blue"></button><button class="pink"></button><button class="yellow"></button><button class="green"></button><button class="purple"></button>
</div>
<h3>アイコン</h3>
<div class="icons">
<button>⭐</button><button>🌙</button><button>🌸</button><button>🍃</button><button>🦊</button><button>🎐</button>
</div>
<button id="submit">🎋 願いを結ぶ</button>
<button id="view">🌌 みんなの願いを見る</button>
</section>
</main>
<script src="script.js"></script>
</body>
</html>
